; PHP Custom Configuration
upload_max_filesize = 20M
post_max_size = 20M
memory_limit = 512M
max_execution_time = 300
max_input_vars = 3000
date.timezone = Asia/Shanghai

; Error handling (production)
display_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php-error.log

; Session
session.gc_maxlifetime = 1440
