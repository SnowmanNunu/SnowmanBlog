version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snowmanblog-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - snowmanblog-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=snowmanblog
      - DB_USERNAME=snowman
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=database
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis

  web:
    image: nginx:alpine
    container_name: snowmanblog-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - snowmanblog-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: snowmanblog-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: snowmanblog
      MYSQL_USER: snowman
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - snowmanblog-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: snowmanblog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - snowmanblog-network

  # 可选：队列处理器
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snowmanblog-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:listen --sleep=3 --tries=3
    volumes:
      - ./:/var/www/html
    networks:
      - snowmanblog-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=snowmanblog
      - DB_USERNAME=snowman
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # 可选：定时任务
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snowmanblog-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./:/var/www/html
    networks:
      - snowmanblog-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=snowmanblog
      - DB_USERNAME=snowman
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379

networks:
  snowmanblog-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
